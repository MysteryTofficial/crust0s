title   Crust OS
sort-key crust-lts
linux   /vmlinuz-linux-lts
initrd  /intel-ucode.img
initrd  /amd-ucode.img
initrd  /initramfs-linux-lts.img
options root=PARTUUID=XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX rw rootflags=subvol=@ quiet splash loglevel=3 rd.systemd.show_status=false rd.udev.log_priority=3 vt.global_cursor_default=0 i915.enable_psr=1 amdgpu.dcfeaturemask=0x2
