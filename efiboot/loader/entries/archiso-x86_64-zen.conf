title   Crust OS Live (Zen kernel)
sort-key crust-zen
linux   /%INSTALL_DIR%/boot/vmlinuz-linux-zen
initrd  /%INSTALL_DIR%/boot/intel-ucode.img
initrd  /%INSTALL_DIR%/boot/amd-ucode.img
initrd  /%INSTALL_DIR%/boot/initramfs-linux-zen.img
options archisobasedir=%INSTALL_DIR% archisolabel=%ISO_LABEL% quiet splash loglevel=3 rd.systemd.show_status=false rd.udev.log_priority=3 vt.global_cursor_default=0 i915.enable_psr=1 amdgpu.dcfeaturemask=0x2
