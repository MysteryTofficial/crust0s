# Crust OS — publish update manifest to GitHub Pages
#
# On every push to main, this workflow:
#   1. Reads the repo/update.json manifest template
#   2. (Optionally) builds any PKGBUILDs found in packages/
#   3. Generates the final update.json with timestamps
#   4. Deploys to gh-pages branch (served via GitHub Pages)
#
name: publish-crust-repo

on:
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - 'repo/**'
      - '.github/workflows/publish-repo.yml'
  workflow_dispatch:   # manual trigger

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build packages (if any PKGBUILDs present)
        run: |
          if [ -d packages ]; then
            for pkg in packages/*/; do
              if [ -f "$pkg/PKGBUILD" ]; then
                echo "Building $(basename $pkg)..."
                (cd "$pkg" && makepkg -s --noconfirm)
              fi
            done
          fi

      - name: Generate update.json
        run: |
          # Copy repo template, inject build timestamp
          if [ -f repo/update.json ]; then
            DATE_ISO=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            sed "s/__BUILD_DATE__/$DATE_ISO/g" repo/update.json > update.json
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          keep_files: false
