# Crust OS — Calamares shellprocess module
# Runs crust-hwdetect post-install for GPU/driver auto-detection
---
name: shellprocess
type: job
interface: shell
script: |
  #!/usr/bin/env bash
  set -eu
  if [ -x /usr/local/bin/crust-hwdetect ]; then
    /usr/local/bin/crust-hwdetect "$1" 2>&1 | tee /var/log/crust-hwdetect-install.log
  else
    echo "[!] crust-hwdetect not found — skipping HW auto-detection" >&2
  fi
  exit 0   # never fail the install over optional driver detection
